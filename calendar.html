<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Tracker | Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="home">

  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img class="main-logo" src="images/logo.png" alt="Main logo">
        <span class="brand-name">Fitness Tracker</span>
      </a>

      <!-- Mobile menu button -->
      <button class="menu-toggle" id="menuToggle">☰</button>

      <nav class="main-nav" id="mainNav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="log_workout.html">Log Workout</a></li>
          <li><a href="calendar.html">Calendar</a></li>
          <li><a href="signup.html">Get Started</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero-wrap">
    <div class="hero container">
      <h1 class="hero-title">Your Workout Today</h1>

      <!-- Days -->
      <div class="panel days-row">
        <span>S</span>
        <span>M</span>
        <span>T</span>
        <span class="active-day">W</span>
        <span>T</span>
        <span>F</span>
        <span>S</span>
      </div>

      <!-- Workout list -->
      <div class="panel workout-list">
        <p>Push-ups - 3 sets of 8-12</p>
        <p>Dumbbell Shoulder Press - 3 sets of 10</p>
        <p>Bicep Curls - 3 sets of 12</p>
        <p>Tricep Dips - 3 sets of 10</p>
        <p>Bent Over Rows - 3 sets of 12</p>
      </div>
    </div>
  </section>

<script>
/* Mobile menu toggle */
document.getElementById("menuToggle").addEventListener("click", function() {
  document.getElementById("mainNav").classList.toggle("open");
});
</script>

<!-- KEEP YOUR EXISTING CALENDAR SCRIPT BELOW -->
</body>
</html>
