<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Tracker</title>

  <style>
    :root {
      --bg: #f7f7f7;
      --card: #ffffff;
      --text: #222;
      --accent: #4f46e5;
    }

    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 16px;
    }

    /* HEADER */
    .site-header {
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 1000;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .main-logo {
      width: 40px;
    }

    .menu-toggle {
      font-size: 24px;
      border: none;
      background: none;
      cursor: pointer;
    }

    .main-nav {
      display: none;
      width: 100%;
    }

    .main-nav.open {
      display: block;
    }

    .main-nav ul {
      list-style: none;
    }
