<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Tracker | Calendar</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- HEADER -->
<header class="site-header">
  <div class="container header-inner">

    <a href="index.html" class="brand">
      <img class="main-logo" src="images/logo.png" alt="logo">
      <span class="brand-name">Fitness Tracker</span>
    </a>

    <button id="menuToggle" class="menu-toggle">☰</button>

    <nav class="main-nav" id="mainNav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="log_workout.html">Log Workout</a></li>
        <li><a href="calendar.html">Calendar</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>

  </div>
</header>

<!-- MAIN -->
<main class="container">

  <!-- TITLE -->
  <h1 class="page-title">Workout Calendar</h1>

  <!-- CONTROLS -->
  <div class="calendar-controls panel">
    <button id="prevMonth">←</button>
    <div>
      <span id="monthLabel"></span>
      <span id="yearLabel"></span>
    </div>
    <button id="nextMonth">→</button>
    <button id="todayBtn">Today</button>
  </div>

  <!-- CALENDAR GRID -->
  <div class="calendar-grid panel"></div>

  <!-- SELECTED DAY -->
  <div class="panel">
    <h2 id="selectedDayLabel">Select a date</h2>
    <p id="selectedDayInfo"></p>
    <ul id="eventsList"></ul>

    <form id="eventForm">
      <input type="text" id="eventTitle" placeholder="Add event..." required>
      <button type="submit">Add</button>
    </form>

    <button id="clearDay">Clear Day</button>
  </div>

</main>

<!-- NAV TOGGLE -->
<script>
document.getElementById("menuToggle").onclick = function () {
  document.getElementById("mainNav").classList.toggle("open");
};
</script>

<!-- ✅ KEEP YOUR ORIGINAL CALENDAR SCRIPT RIGHT HERE -->
<!-- (DO NOT CHANGE IT) -->

</body>
</html>
