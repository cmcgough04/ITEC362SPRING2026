<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Tracker | Calendar</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .days-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .day-btn {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 10px 14px;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    .day-btn:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .day-btn.active-day {
      background: rgba(255, 255, 255, 0.15);
      font-weight: bold;
    }

    .instagram-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #E1306C;
  border-radius: 50%;
  width: 55px;
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font-size: 28px;
  color: white;
  z-index: 9999;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: transform 0.2s ease;
}

.instagram-btn:hover {
  transform: scale(1.1);
}

    
  </style>
</head>
  
<body class="home">

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="Fitness Tracker home">
        <img class="main-logo" src="images/logo.png" alt="Main logo">
        <span class="brand-name">Fitness Tracker</span>
      </a>

      <button
        class="menu-toggle"
        id="menuToggle"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="mainNav"
      >
        ☰
      </button>

      <nav class="main-nav" id="mainNav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="log_workout.html">Log Workout</a></li>
          <li><a href="calendar.html">Calendar</a></li>
          <li><a href="signup.html">Get Started</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-wrap">
      <div class="hero container">
        <h1 class="hero-title">Your Workout Today</h1>

        <div class="panel days-row" aria-label="Workout days">
          <button class="day-btn" data-day="sun">S</button>
          <button class="day-btn" data-day="mon">M</button>
          <button class="day-btn" data-day="tue">T</button>
          <button class="day-btn active-day" data-day="wed">W</button>
          <button class="day-btn" data-day="thu">T</button>
          <button class="day-btn" data-day="fri">F</button>
          <button class="day-btn" data-day="sat">S</button>
        </div>

        <div class="panel workout-list" id="workoutList">
          <p>Push-ups - 3 sets of 8-12</p>
          <p>Dumbbell Shoulder Press - 3 sets of 10</p>
          <p>Bicep Curls - 3 sets of 12</p>
          <p>Tricep Dips - 3 sets of 10</p>
          <p>Bent Over Rows - 3 sets of 12</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const menuToggle = document.getElementById("menuToggle");
    const mainNav = document.getElementById("mainNav");

    menuToggle.addEventListener("click", function () {
      mainNav.classList.toggle("open");
      const expanded = mainNav.classList.contains("open");
      menuToggle.setAttribute("aria-expanded", expanded);
    });

    const workouts = {
      sun: [
        "Rest Day - Light stretching",
        "Walk - 20 minutes",
        "Foam Rolling - 10 minutes"
      ],
      mon: [
        "Bench Press - 3 sets of 8",
        "Push-ups - 3 sets of 12",
        "Tricep Extensions - 3 sets of 10",
        "Plank - 3 rounds of 30 seconds"
      ],
      tue: [
        "Squats - 3 sets of 10",
        "Lunges - 3 sets of 12",
        "Leg Press - 3 sets of 10",
        "Calf Raises - 3 sets of 15"
      ],
      wed: [
        "Push-ups - 3 sets of 8-12",
        "Dumbbell Shoulder Press - 3 sets of 10",
        "Bicep Curls - 3 sets of 12",
        "Tricep Dips - 3 sets of 10",
        "Bent Over Rows - 3 sets of 12"
      ],
      thu: [
        "Deadlifts - 3 sets of 8",
        "Pull-ups - 3 sets of 6",
        "Lat Pulldowns - 3 sets of 10",
        "Hammer Curls - 3 sets of 12"
      ],
      fri: [
        "Treadmill Run - 20 minutes",
        "Jump Rope - 3 rounds of 2 minutes",
        "Burpees - 3 sets of 10",
        "Mountain Climbers - 3 sets of 20"
      ],
      sat: [
        "Yoga Flow - 20 minutes",
        "Sit-ups - 3 sets of 15",
        "Russian Twists - 3 sets of 20",
        "Stretching - 15 minutes"
      ]
    };

    const dayButtons = document.querySelectorAll(".day-btn");
    const workoutList = document.getElementById("workoutList");

    dayButtons.forEach(button => {
      button.addEventListener("click", function () {
        const selectedDay = this.dataset.day;

        dayButtons.forEach(btn => btn.classList.remove("active-day"));
        this.classList.add("active-day");

        workoutList.innerHTML = "";

        workouts[selectedDay].forEach(workout => {
          const p = document.createElement("p");
          p.textContent = workout;
          workoutList.appendChild(p);
        });
      });
    });
  </script>
  <a href="https://www.instagram.com" target="_blank" class="instagram-btn" aria-label="Instagram">📸</a>
</body>
</html>
