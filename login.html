<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fitness Tracker — Log In</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login">

  <header class="site-header" role="banner">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="Fitness Tracker home">
        <img class="main-logo" src="images/logo.png" alt="Main logo for site">
        <span class="brand-name">Fitness Tracker</span>
      </a>

      <button
        class="menu-toggle"
        id="menuToggle"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="mainNav"
      >
        ☰
      </button>

      <nav class="main-nav" id="mainNav" role="navigation" aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="log_workout.html">Log Workout</a></li>
          <li><a href="calendar.html">Calendar</a></li>
          <li><a href="signup.html">Get Started</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container" id="main" role="main">
    <section class="page-head">
      <h1>Welcome back</h1>
      <p class="lead">Sign in to access your workouts, insights, and goals.</p>
    </section>

    <section class="panel auth-panel" aria-labelledby="signin-heading">
      <div class="form-container">
        <h2 id="signin-heading">Log in to your account</h2>

        <form id="loginForm" class="auth-form" action="#" method="post" autocomplete="on" novalidate>
          <div class="form-row">
            <label for="loginEmail">Email address</label>
            <input id="loginEmail" name="email" type="email" required placeholder="you@example.com" autocomplete="email">
          </div>

          <div class="form-row">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" name="password" type="password" required minlength="8" placeholder="••••••••" autocomplete="current-password">
          </div>

          <div class="form-options">
            <label class="checkbox-row">
              <input type="checkbox" name="remember" aria-label="Remember me">
              <span>Remember me</span>
            </label>
            <a href="signup.html" class="text-link">Create an account</a>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Sign In</button>
            <button type="button" id="loginDemo" class="btn btn-ghost">Demo</button>
          </div>

          <div id="loginStatus" class="form-status" aria-live="polite"></div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <p>&copy; <span id="year-login"></span> Fitness Tracker</p>
      <p class="small-note"><a href="contact_revamped.html">Contact</a> · <a href="index.html">Home</a></p>
    </div>
  </footer>

  <script>
    document.getElementById('year-login').textContent = new Date().getFullYear();

    const menuToggle = document.getElementById("menuToggle");
    const mainNav = document.getElementById("mainNav");

    menuToggle.addEventListener("click", function () {
      mainNav.classList.toggle("open");
      const expanded = mainNav.classList.contains("open");
      menuToggle.setAttribute("aria-expanded", expanded);
    });

    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const status = document.getElementById('loginStatus');

      if (!email) {
        status.textContent = 'Please enter your email.';
        status.className = 'form-status error';
        return;
      }

      status.textContent = 'Signed in (demo).';
      status.className = 'form-status ok';
    });

    document.getElementById('loginDemo').addEventListener('click', function(){
      document.getElementById('loginEmail').value = 'demo@fitnesstracker.com';
      document.getElementById('loginPassword').value = 'password123';
      document.getElementById('loginForm').dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
